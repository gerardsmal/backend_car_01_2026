spring.application.name=project-car-jpa

logging.level.root=info
logging.level.com.betacom=debug
logging.file=./jpa.log
logging.pattern.console=  %d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n

server.port=9090

spring.datasource.url=jdbc:postgresql://localhost:5432/db_car_01_2026
spring.datasource.username=postgres
spring.datasource.password=${pwd}

spring.jpa.show-sql= false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=drop-and-create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=define.sql
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.drop-target=drop.sql
spring.jpa.properties.hibernate.hbm2ddl.schema-generation.script.append=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${mail.sender}
spring.mail.password=${mail.password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=false

mail.sender=${mail.sender}
mail.validation=http://localhost:4200/emailValidation/
mail.resetPassword=http://localhost:4200/resetPassword/

app.upload.dir=uploads
app.cors.allowed-origins=http://localhost:4200

